<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>메디테라피 썸네일 생성기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="app-header">
    <div class="app-logo">
      <img src="assets/logo-symbol.png" alt="메디테라피 로고" width="36" height="36" style="object-fit:contain;">
      <h1>메디테라피 썸네일 생성기</h1>
    </div>
  </header>

  <div class="app-body">

    <!-- 좌측 컨트롤 패널 -->
    <aside class="control-panel">

      <div class="control-group">
        <label class="control-label">브랜드</label>
        <div class="btn-group" id="brandGroup">
          <button class="toggle-btn active" data-value="meditherapy">메디테라피</button>
          <button class="toggle-btn" data-value="hidif" style="display:none">히디프</button>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">국가(자사몰)</label>
        <div class="btn-group" id="countryGroup">
          <button class="toggle-btn active" data-value="tw">대만(TW)</button>
          <button class="toggle-btn" data-value="hk">홍콩(HK)</button>
          <button class="toggle-btn" data-value="sg">싱가포르(SG)</button>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">제품 선택</label>
        <div class="search-wrap">
          <input type="text" id="productSearch" placeholder="제품명으로 검색" autocomplete="off">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="5" stroke="#999" stroke-width="1.5"/>
            <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <div class="search-dropdown" id="productDropdown"></div>
        </div>
        <div class="selected-chips" id="selectedProducts"></div>
      </div>

      <div class="control-group">
        <label class="control-label">무료배송</label>
        <div class="btn-group" id="shippingGroup">
          <button class="toggle-btn active" data-value="no">NO</button>
          <button class="toggle-btn" data-value="yes">YES</button>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label" id="bundleLabel">구성</label>
        <div class="btn-group" id="bundleGroup">
          <button class="toggle-btn active" data-value="no">NO</button>
          <button class="toggle-btn" data-value="1+1">1+1</button>
          <button class="toggle-btn" data-value="2+1">2+1</button>
          <button class="toggle-btn" data-value="3+1">3+1</button>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">할인율</label>
        <div class="input-suffix-wrap">
          <input type="number" id="discountInput" value="0" min="0" max="99" placeholder="0">
          <span class="input-suffix">折</span>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">사은품</label>
        <div class="search-wrap" style="margin-bottom:8px">
          <input type="text" id="giftSearch" placeholder="제품명으로 검색" autocomplete="off">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="5" stroke="#999" stroke-width="1.5"/>
            <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <div class="search-dropdown" id="giftDropdown"></div>
        </div>
        <div class="selected-chips" id="selectedGifts"></div>
        <input type="text" id="giftLabelInput" placeholder="사은품 텍스트 (ex. 미스트 공병 증정)" class="text-input">
      </div>

      <div class="export-buttons">
        <button class="btn-export btn-jpg" id="exportJpg"><img src="assets/download-icon.png" class="btn-dl-icon" alt=""> JPG</button>
        <button class="btn-export btn-png" id="exportPng"><img src="assets/download-icon.png" class="btn-dl-icon" alt=""> PNG</button>
      </div>

    </aside>

    <!-- 우측 미리보기 -->
    <section class="preview-area">
      <p class="preview-label">미리보기 (1000x1000px)</p>
      <div class="preview-container" id="previewContainer">
        <div class="thumbnail-scaler" id="thumbnailScaler">

          <div id="thumbnail">

            <!-- 免運 배지 -->
            <div class="th-badge-shipping" id="thShipping" style="display:none">
              <img src="assets/delivery-icon.png" alt="배송" class="th-shipping-icon">
              <span>免運</span>
            </div>

            <!-- 折 배지 -->
            <div class="th-badge-discount" id="thDiscount" style="display:none">
              <span id="thDiscountText">0折</span>
            </div>

            <!-- 구성 배지 -->
            <div class="th-badge-bundle" id="thBundle" style="display:none">
              <span id="thBundleText">1+1</span>
            </div>

            <!-- 제품 이미지 -->
            <div class="th-products" id="thProducts"></div>

            <!-- 사은품 + 기호 -->
            <div class="th-gift-plus" id="thGiftPlus" style="display:none">
              <div class="th-gift-plus-circle"></div>
              <span>+</span>
            </div>

            <!-- 사은품 영역 -->
            <div class="th-gift-wrap" id="thGift" style="display:none">
              <div class="th-gift-imgs" id="thGiftImgs"></div>
              <div class="th-gift-label" id="thGiftLabel">사은품 증정</div>
            </div>

          </div>
        </div>
      </div>
    </section>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
